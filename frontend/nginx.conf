# nginx config for serving the PsyLearn Profiler single-page app.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any unknown route serves index.html so React Router works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (they are content-hashed by Vite).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
