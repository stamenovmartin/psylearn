# Local full-stack orchestration for PsyLearn Profiler.
#   docker compose up --build
# Backend API -> http://localhost:8000  (docs at /docs)
# Frontend    -> http://localhost:5173

services:
  backend:
    build:
      context: ./backend
    container_name: psylearn-backend
    environment:
      # Allow the frontend origin (compose maps it to localhost:5173).
      ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health'); sys.exit(0)"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        # The browser talks to the backend on the host, so use localhost.
        VITE_API_URL: "http://localhost:8000"
    container_name: psylearn-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
